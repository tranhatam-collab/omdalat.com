name: Deploy App Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'scripts/build-cf.mjs'
      - 'scripts/clean-vercel-output.mjs'
      - '.github/workflows/deploy-app-cloudflare-pages.yml'
  workflow_dispatch:
    inputs:
      project:
        description: 'Cloudflare Pages project name'
        required: true
        default: 'omdalat-app-v2'
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy apps/web to app Pages project
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT: ${{ github.event.inputs.project || vars.CF_PAGES_APP_PROJECT || 'omdalat-app-v2' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Cloudflare Pages output
        run: pnpm --filter @omdalat/web build:cf

      - name: Deploy to Cloudflare Pages
        run: |
          PROJECT_NAME="${CF_PAGES_PROJECT:-omdalat-app-v2}"
          pnpm --filter @omdalat/web exec wrangler pages deploy .vercel/output/static --project-name "$PROJECT_NAME"
