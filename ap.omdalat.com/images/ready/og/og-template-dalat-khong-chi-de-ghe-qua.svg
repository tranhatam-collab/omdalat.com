<svg width="2400" height="1350" viewBox="0 0 2400 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="2400" height="1350" fill="url(#bg-gradient)"/>
  
  <!-- Decorative elements -->
  <circle cx="2000" cy="200" r="300" fill="#4a5568" opacity="0.3"/>
  <circle cx="400" cy="1150" r="250" fill="#4a5568" opacity="0.3"/>
  
  <!-- Text content -->
  <text x="1200" y="600" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="#a0aec0" letter-spacing="4">ẤP ĐÀ LẠT</text>
  
  <text x="1200" y="750" text-anchor="middle" font-family="Georgia, serif" font-size="72" fill="#ffffff" font-weight="bold">Đà Lạt Không Chỉ</text>
  <text x="1200" y="840" text-anchor="middle" font-family="Georgia, serif" font-size="72" fill="#ffffff" font-weight="bold">Để Ghé Qua</text>
  
  <text x="1200" y="950" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#cbd5e0" max-width="2000">
    Một bài mở nền cho cách nhìn Đà Lạt như một vùng sống, không phải một trạm dừng du lịch.
  </text>
  
  <!-- Bottom accent -->
  <rect x="0" y="1300" width="2400" height="50" fill="#718096"/>
</svg>
