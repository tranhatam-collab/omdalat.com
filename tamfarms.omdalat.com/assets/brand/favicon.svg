<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Tam Farms favicon">
  <title>Tam Farms</title>
  <desc>Simplified Tam Farms mark for favicon use.</desc>

  <defs>
    <linearGradient id="tf-fav-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5c43"/>
      <stop offset="100%" stop-color="#315f43"/>
    </linearGradient>
    <linearGradient id="tf-fav-sage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8d5ba"/>
      <stop offset="100%" stop-color="#8cc4a3"/>
    </linearGradient>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#tf-fav-green)"/>
  <circle cx="16" cy="16" r="11.5" fill="#f6f2e8"/>

  <!-- Simplified nodes (4 visible for clarity at small size) -->
  <g stroke="#1a5c43" stroke-width="1.1" stroke-linecap="round" opacity="0.55" fill="none">
    <line x1="16" y1="16" x2="16" y2="8.5"/>
    <line x1="16" y1="16" x2="22.5" y2="12.5"/>
    <line x1="16" y1="16" x2="22.5" y2="19.5"/>
    <line x1="16" y1="16" x2="16" y2="23.5"/>
    <line x1="16" y1="16" x2="9.5" y2="19.5"/>
    <line x1="16" y1="16" x2="9.5" y2="12.5"/>
  </g>
  <g fill="#1a5c43">
    <circle cx="16" cy="8.5" r="1.3"/>
    <circle cx="22.5" cy="12.5" r="1.3"/>
    <circle cx="22.5" cy="19.5" r="1.3"/>
    <circle cx="16" cy="23.5" r="1.3"/>
    <circle cx="9.5" cy="19.5" r="1.3"/>
    <circle cx="9.5" cy="12.5" r="1.3"/>
  </g>

  <!-- Central leaf -->
  <path d="M16 9 C 18.6 10.2, 19.6 14, 18.5 17 C 17.5 19.6, 15 19.8, 13.4 18.2 C 12 16.8, 12.5 13.6, 14.2 11.8 C 15 11, 15.6 10, 16 9 Z" fill="url(#tf-fav-sage)" stroke="#1a5c43" stroke-width="0.9" stroke-linejoin="round"/>
  <path d="M16 9.5 L 16 19.5" stroke="#1a5c43" stroke-width="1" stroke-linecap="round" fill="none"/>
</svg>
